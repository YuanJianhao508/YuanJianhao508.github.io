{% if site.data.experience %}
<div class="experience-grid">
  {% for item in site.data.experience %}
  <div class="experience-card">
    {% if item.url %}<a href="{{ item.url }}" target="_blank" rel="noopener" class="experience-logo">{% else %}<div class="experience-logo">{% endif %}
      <img src="{{ item.logo | relative_url }}" alt="{{ item.company }} logo" loading="lazy">
    {% if item.url %}</a>{% else %}</div>{% endif %}
    <div class="experience-content">
      <h3>{{ item.company }}</h3>
      <div class="experience-role">{{ item.role }}</div>
      <div class="experience-year">{{ item.year }}</div>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
